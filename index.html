<!DOCTYPE html>
<html>
    <head>
        <title>Markspace</title>
        <style>
            body {
                background-color: #00001e;
            }
            * {
                scrollbar-color: #fffdd0 transparent;
                font-family: sans-serif;
                font-size: 16px;
            }
            ::-webkit-scrollbar-thumb {
              background: #0f0; 
            }
            .panels {
                background-color: #253f52;
                border-radius: 15px;
            }
            .textBoxes {
                color: #fffdd0;
                outline: none;
            }
            #app {
                position: absolute;
                bottom: 0;
                left: 0;
                display: flex;
                width: calc(100vw - 20px);
                height: calc(90vh - 20px);
                gap: 10px;
                margin: 10px;
            }
            #sidePanel {
                flex: 1;
            }
            #editorPanel {
                flex: 2;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #editor {
                height: 90%;
                width: 90%;
                font-family: sans-serif;
            }
            #previewPanel {
                flex: 2;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #preview {
                height: 90%;
                width: 90%;
                overflow-y: auto;
                overflow-wrap: break-word;
                word-break: break-word;
            }
            #preview h1 { font-size: 2em; }
            #preview h2 { font-size: 1.5em; }
            #preview h3 { font-size: 1.2em; }
            #preview code {
                background-color: rgba(255, 255, 255, 0.1);
                padding: 1px 5px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.9em;
            }
            #preview a {
                color: #fffdd0;
                text-decoration: underline;
            }
            #preview ul {
                padding-left: 20px;
            }
            #preview li {
                margin-bottom: 4px;
            }
            #editor {
                resize: none;
                background-color: transparent;
                border: none;
            }
            #topBar {
                position: absolute;
                top: 0;
                left: 0;
                display: flex;
                width: 100vw;
                height: 10vh;
            }
            #name {
                color: #fffdd0;
                flex: 1;
                font-size: 6vh;
                display: flex;
                margin: 10px;
                justify-content: flex-start;
                align-items: center;
            }
            #editorButtons, #previewButtons {
                flex: 2;
            }
        </style>
    </head>
    <body>
        <div id="topBar">
            <h1 id="name">Markspace</h1>
            <div id="editorButtons"></div>
            <div id="previewButtons"></div>
        </div>
        <div id="app">
            <div class="panels" id="sidePanel"></div>
            <div class="panels" id="editorPanel">
                <textarea class="textBoxes" id="editor" placeholder="Write markdown here..."></textarea>
            </div>
            <div class="panels" id="previewPanel">
                <div class="textBoxes" id="preview"></div>
            </div>
        </div>
        <script>
            let notes = [];
        let activeNoteId = 0;
        
        function parseMarkdown(str) {
            str = str.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
            str = str.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
            str = str.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            str = str.replace(/\*(.+?)\*/g,     '<em>$1</em>');
            str = str.replace(/`(.+?)`/g,       '<code>$1</code>');
            str = str.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
            str = str.replace(/^- (.+)$/gm, '<li>$1</li>');
            str = str.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            str = str.replace(/^---$/gm, '<hr>');
            str = str.replace(/\n\n/g, '<br><br>');
            str = str.replace(/\n/g, ' ');
            return str;
        }
        
        const editor = document.getElementById("editor");
        const preview = document.getElementById("preview");
        
        editor.addEventListener("input", () => {
            preview.innerHTML = parseMarkdown(editor.value);
        });
        </script>
    </body>
</html>
