<!DOCTYPE html>
<html>
    <head>
        <title>Markspace</title>
        <style>
            :root {
                --primary-color: #00001e;
                --secondary-color: #253f52;
                --tertiary-color: #285F7B;
                --tertiary-hover: #447F9C;
                --tertiary-selected: #5E8DA6;
                --accent: #fffdd0;
            }
            body {
                background-color: var(--primary-color);
            }
            * {
                scrollbar-color: var(--accent) transparent;
                font-family: sans-serif;
                font-size: 16px;
            }
            .panels {
                background-color: var(--secondary-color);
                border-radius: 15px;
            }
            .textBoxes {
                color: var(--accent);
                outline: none;
            }
            #app {
                position: absolute;
                bottom: 0;
                left: 0;
                display: flex;
                width: calc(100vw - 20px);
                height: calc(90vh - 20px);
                gap: 10px;
                margin: 10px;
            }
            #sidePanel {
                flex: 1;
                display: flex;
                flex-flow: column nowrap;
                justify-content: flex-start;
                align-items: center;
                gap: 10px;
                padding-top: 10px;
            }
            .noteItems {
                width: 90%;
                height: 10vh;
                background-color: var(--tertiary-color);
                color: var(--accent);
                border-radius: 10px;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                padding-left: 10px;
                font-size: 2rem;
                font-family: sans-serif;
                font-weight: bold;
            }
            .noteItems:hover, .noteItemsSelected:hover {
                background-color: var(--tertiary-hover);
                cursor: pointer;
            }
            .noteItemsSelected {
                width: 90%;
                height: 10vh;
                background-color: var(--tertiary-selected);
                color: var(--accent);
                border-radius: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-left: 10px;
                font-size: 2rem;
                font-family: sans-serif;
                font-weight: bold;
            }
            #editorPanel {
                flex: 2;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #editor {
                height: 90%;
                width: 90%;
                font-family: sans-serif;
            }
            #previewPanel {
                flex: 2;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #preview {
                height: 90%;
                width: 90%;
                overflow-y: auto;
                overflow-wrap: break-word;
                word-break: break-word;
            }
            #preview h1 { font-size: 2em; }
            #preview h2 { font-size: 1.5em; }
            #preview h3 { font-size: 1.2em; }
            #preview code {
                background-color: rgba(255, 255, 255, 0.1);
                padding: 1px 5px;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.9em;
            }
            #preview a {
                color: var(--accent);
                text-decoration: underline;
            }
            #preview ul {
                padding-left: 20px;
            }
            #preview li {
                margin-bottom: 4px;
            }
            #editor {
                resize: none;
                background-color: transparent;
                border: none;
            }
            #topBar {
                position: absolute;
                top: 0;
                left: 0;
                display: flex;
                width: 100vw;
                height: 10vh;
            }
            #name {
                color: var(--accent);
                flex: 1;
                font-size: 6vh;
                display: flex;
                margin: 10px;
                justify-content: flex-start;
                align-items: center;
            }
            #editorButtons, #previewButtons {
                flex: 2;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                gap: 10px;
                padding: 10px;
            }
            .topBarButtons {
                height: 90%;
                aspect-ratio: 1 / 1;
            }
        </style>
    </head>
    <body>
        <div id="topBar">
            <button onclick="localStorage.setItem('notes', '');">dasf</button>
            <h1 id="name">Markspace</h1>
            <div id="editorButtons">
                <button class="topBarButtons" onclick="addNote();">+</button>
            </div>
            <div id="previewButtons"></div>
        </div>
        <div id="app">
            <div class="panels" id="sidePanel"></div>
            <div class="panels" id="editorPanel">
                <textarea class="textBoxes" id="editor" placeholder="Write markdown here..."></textarea>
            </div>
            <div class="panels" id="previewPanel">
                <div class="textBoxes" id="preview"></div>
            </div>
        </div>
        <script>
            let notes = [];
            let activeNoteId = 0;
            
            function parseMarkdown(str) {
                str = str.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
                str = str.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
                str = str.replace(/^### (.+)$/gm, '<h3>$1</h3>');
                str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                str = str.replace(/\*(.+?)\*/g,     '<em>$1</em>');
                str = str.replace(/`(.+?)`/g,       '<code>$1</code>');
                str = str.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
                str = str.replace(/^- (.+)$/gm, '<li>$1</li>');
                str = str.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
                str = str.replace(/^---$/gm, '<hr>');
                str = str.replace(/\n\n/g, '<br><br>');
                str = str.replace(/\n/g, ' ');
                return str;
            }
            
            const editor = document.getElementById("editor");
            const preview = document.getElementById("preview");
            
            editor.addEventListener("input", () => {
                notes.find(n => n.id === activeNoteId).content = editor.value;
                preview.innerHTML = parseMarkdown(editor.value);
                saveNotes();
            });

            function saveNotes() {
                localStorage.setItem("notes", JSON.stringify(notes));
            }
            
            function loadNotes() {
                const saved = localStorage.getItem("notes");
                if (saved) {
                    notes = JSON.parse(saved);
                } else {
                    notes = [{ id: 0, title: "Untitled", content: "" }];
                }
                activeNoteId = notes[0].id;
                editor.value = notes[0].content;
                preview.innerHTML = parseMarkdown(notes[0].content);
                renderSidebar();
            }
            loadNotes();

            function renderSidebar() {
                document.querySelector("#sidePanel").innerHTML = "";
                notes.forEach(function(note, index) {
                    let newNote = document.createElement("div");
                    document.querySelector("#sidePanel").appendChild(newNote);
                    newNote.id = "note" + index;
                    if (note.id == activeNoteId) {
                        newNote.className = "noteItemsSelected";
                    } else {
                        newNote.className = "noteItems";
                    }
                    newNote.innerText = note.title;
                    newNote.onclick = () => switchNote(note.id);
                })
            }

            function switchNote(id) {
                saveNotes();
                activeNoteId = id;
                editor.value = notes.find(n => n.id === activeNoteId).content;
                preview.innerHTML = parseMarkdown(editor.value);
                renderSidebar();
            }

            function addNote() {
                let noteCount = notes.length;
                notes.push({id: (noteCount + 1), title: "Untitled", content: ""});
                renderSidebar();
            }
        </script>
    </body>
</html>
